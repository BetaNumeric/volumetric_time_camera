<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Volume Camera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
        .active-ring {
            position: absolute;
            inset: -8px;
            border: 2px solid rgba(220, 38, 38, 0.5);
            border-radius: 9999px;
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% { transform: scale(1.4); opacity: 0; }
        }
        #sourceVideo {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="fixed inset-0 flex flex-col items-center">

    <!-- Viewport Area -->
    <div id="viewport" class="relative flex-1 w-full flex items-center justify-center bg-neutral-950 overflow-hidden">
        
        <!-- User Gesture Required Overlay -->
        <div id="startOverlay" class="absolute inset-0 flex flex-col items-center justify-center space-y-6 z-50 bg-black">
            <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <div class="text-center">
                <h1 class="text-xl font-bold tracking-widest uppercase mb-2">Time Volume</h1>
                <p class="text-xs text-neutral-500 uppercase tracking-widest mb-8">Visualizer</p>
                <button id="initBtn" class="px-10 py-4 bg-white text-black rounded-full font-black uppercase tracking-tighter active:scale-95 transition-transform">
                    Initialize System
                </button>
            </div>
        </div>

        <!-- Error State -->
        <div id="error-view" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black p-8 text-center z-50">
            <div class="text-red-500 text-5xl mb-4">⚠️</div>
            <h2 class="text-2xl font-bold">Connection Failed</h2>
            <p id="error-msg" class="text-neutral-400 mt-4 max-w-xs text-sm">Could not access hardware.</p>
            <button onclick="window.location.reload()" class="mt-8 px-8 py-3 bg-neutral-800 text-white rounded-full font-bold uppercase tracking-wider text-xs">
                Tap to Retry
            </button>
        </div>
        
        <!-- Main Stack Canvas -->
        <canvas id="stackCanvas"></canvas>

        <!-- Recording HUD -->
        <div id="hud" class="hidden absolute top-8 left-8 flex items-center space-x-3 bg-red-600 px-5 py-2.5 rounded-full animate-pulse shadow-2xl z-20">
            <div class="w-3 h-3 bg-white rounded-full"></div>
            <span class="text-xs font-black uppercase tracking-[0.2em]">Recording</span>
        </div>

        <div id="readyHud" class="hidden absolute top-8 right-8 text-neutral-500 text-[10px] tracking-widest uppercase pointer-events-none bg-black/40 px-3 py-1 rounded-full border border-white/5">
            System Ready
        </div>
    </div>

    <!-- Controls -->
    <div class="w-full bg-neutral-950 p-8 flex items-center justify-between border-t border-white/5 pb-14 z-30 max-w-3xl mx-auto">
        
        <button id="resetBtn" class="group flex flex-col items-center space-y-2 active:scale-90 transition-transform">
            <div class="p-5 rounded-2xl bg-neutral-900 text-neutral-500 border border-white/5">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
            </div>
            <span class="text-[9px] uppercase tracking-widest font-bold text-neutral-600">Clear</span>
        </button>

        <div class="relative">
            <div id="pingRing" class="hidden active-ring"></div>
            <button id="triggerBtn" class="p-12 rounded-full bg-white text-black shadow-xl relative z-10 active:scale-95 transition-all">
                <div id="iconPlay">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </div>
                <div id="iconStop" class="hidden">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                </div>
            </button>
        </div>

        <button id="saveBtn" class="group flex flex-col items-center space-y-2 active:scale-90 transition-transform">
            <div class="p-5 rounded-2xl bg-neutral-900 text-neutral-500 border border-white/5">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg>
            </div>
            <span class="text-[9px] uppercase tracking-widest font-bold text-neutral-600">Save</span>
        </button>
    </div>

    <!-- Video element is technically in DOM but invisible -->
    <video id="sourceVideo" autoplay playsinline muted></video>

    <div class="absolute bottom-4 text-[9px] text-neutral-700 uppercase tracking-[0.4em] w-full text-center pointer-events-none font-bold">
        Luminous Sculpture Interface v1.3
    </div>

    <script>
        const video = document.getElementById('sourceVideo');
        const canvas = document.getElementById('stackCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const initBtn = document.getElementById('initBtn');
        const startOverlay = document.getElementById('startOverlay');
        const triggerBtn = document.getElementById('triggerBtn');
        const resetBtn = document.getElementById('resetBtn');
        const saveBtn = document.getElementById('saveBtn');
        const hud = document.getElementById('hud');
        const readyHud = document.getElementById('readyHud');
        const errorView = document.getElementById('error-view');
        
        let isCapturing = false;

        async function startSystem() {
            try {
                const constraints = {
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // Define the callback BEFORE calling play to avoid missing the event
                video.onplaying = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.fillStyle = 'black';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    startOverlay.classList.add('hidden');
                    readyHud.classList.remove('hidden');
                    render();
                };

                // Explicit play for mobile compliance
                await video.play();

            } catch (err) {
                console.error("Camera Error:", err);
                startOverlay.classList.add('hidden');
                errorView.classList.remove('hidden');
                document.getElementById('error-msg').innerText = err.name === 'NotAllowedError' 
                    ? "Permission denied. Please enable camera access in settings." 
                    : err.message || "Could not access camera.";
            }
        }

        function render() {
            // Only perform canvas operations if we are actively capturing
            if (isCapturing && video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.globalCompositeOperation = 'lighten';
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(render);
        }

        initBtn.addEventListener('click', startSystem);

        triggerBtn.addEventListener('click', () => {
            if (!isCapturing) {
                // START RECORDING
                // Ensure starting from a clean black slate
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                isCapturing = true;
                triggerBtn.classList.replace('bg-white', 'bg-red-600');
                triggerBtn.classList.replace('text-black', 'text-white');
                document.getElementById('iconPlay').classList.add('hidden');
                document.getElementById('iconStop').classList.remove('hidden');
                hud.classList.remove('hidden');
                readyHud.classList.add('hidden');
                document.getElementById('pingRing').classList.remove('hidden');
            } else {
                // STOP RECORDING
                isCapturing = false;
                triggerBtn.classList.replace('bg-red-600', 'bg-white');
                triggerBtn.classList.replace('text-white', 'text-black');
                document.getElementById('iconPlay').classList.remove('hidden');
                document.getElementById('iconStop').classList.add('hidden');
                hud.classList.add('hidden');
                readyHud.classList.remove('hidden');
                document.getElementById('pingRing').classList.add('hidden');
            }
        });

        resetBtn.addEventListener('click', () => {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        saveBtn.addEventListener('click', () => {
            if (isCapturing) return;
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `light-sculpture-${Date.now()}.png`;
            link.href = dataUrl;
            link.click();
        });
    </script>
</body>
</html>
