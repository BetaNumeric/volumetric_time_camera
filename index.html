
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Volumetric Time">
    <meta name="description" content="Long-exposure camera interface for the Volumetric Time installation.">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon_32.png">
    <link rel="apple-touch-icon" href="./icons/icon_192.png">
    <title>v1.5 Volumetric Time Camera</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
        #reviewImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            touch-action: auto;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: default;
            -webkit-user-drag: none;
        }
        .active-ring {
            position: absolute;
            inset: -8px;
            border: 2px solid rgba(220, 38, 38, 0.5);
            border-radius: 9999px;
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% { transform: scale(1.4); opacity: 0; }
        }
        .shutter-button {
            width: 7rem;
            height: 7rem;
            padding: 0;
            box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.22), 0 20px 25px -5px rgba(0, 0, 0, 0.22), 0 8px 10px -6px rgba(0, 0, 0, 0.22);
        }
        .shutter-button.is-recording {
            box-shadow: 0 0 0 6px rgba(220, 38, 38, 0.32), 0 25px 50px -12px rgba(220, 38, 38, 0.45);
        }
        .shutter-stop-symbol {
            width: 2.1rem;
            height: 2.1rem;
            border-radius: 0.35rem;
            background: currentColor;
            opacity: 0;
            transform: scale(0.82);
            transition: opacity 140ms ease, transform 140ms ease;
        }
        .shutter-button.is-recording .shutter-stop-symbol {
            opacity: 1;
            transform: scale(1);
        }
        #sourceVideo {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        .control-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            display: block;
            filter: brightness(0) saturate(100%) invert(43%) sepia(6%) saturate(329%) hue-rotate(183deg) brightness(94%) contrast(86%);
        }
        .overlay-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
            filter: brightness(0) saturate(100%) invert(100%);
        }
        .start-icon {
            width: 44px;
            height: 44px;
            object-fit: contain;
            display: block;
            filter: brightness(0) saturate(100%) invert(100%);
        }
        .settings-scroll {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-y;
            padding-top: max(5rem, calc(env(safe-area-inset-top) + 1.5rem));
            padding-right: 1.5rem;
            padding-bottom: max(2rem, calc(env(safe-area-inset-bottom) + 1.5rem));
            padding-left: 1.5rem;
        }
        .settings-card {
            position: relative;
            max-width: 24rem;
            margin: 0 auto;
        }
        .image-folder-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
        }
        @media (min-width: 640px) {
            .image-folder-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }
        .image-folder-card {
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.04);
        }
        .image-folder-preview {
            width: 100%;
            aspect-ratio: 4 / 3;
            border: 0;
            padding: 0;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-folder-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .image-folder-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.5rem;
        }
        .image-folder-time {
            min-width: 0;
            color: rgb(163, 163, 163);
            font-size: 0.625rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .image-folder-actions {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            flex-shrink: 0;
        }
        .image-folder-action {
            width: 2rem;
            height: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.06);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-folder-action:active {
            transform: scale(0.94);
        }
        .image-folder-action.danger {
            color: rgb(248, 113, 113);
        }
        .image-folder-action img {
            width: 1rem;
            height: 1rem;
            object-fit: contain;
            display: block;
            filter: brightness(0) saturate(100%) invert(100%);
        }
        .image-folder-action.danger img {
            filter: brightness(0) saturate(100%) invert(61%) sepia(59%) saturate(1249%) hue-rotate(314deg) brightness(101%) contrast(94%);
        }
        .toast {
            position: fixed;
            left: 50%;
            bottom: max(8.25rem, calc(env(safe-area-inset-bottom) + 8.25rem));
            z-index: 60;
            max-width: min(22rem, calc(100vw - 2rem));
            transform: translate(-50%, 0.5rem);
            opacity: 0;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            background: rgba(10, 10, 10, 0.9);
            padding: 0.75rem 1rem;
            color: white;
            font-size: 0.6875rem;
            font-weight: 900;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            text-align: center;
            transition: opacity 160ms ease, transform 160ms ease;
        }
        .toast.is-visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }
    </style>
</head>
<body class="fixed inset-0 flex flex-col items-center">

    <!-- Viewport Area -->
    <div id="viewport" class="relative flex-1 w-full flex items-center justify-center bg-neutral-950 overflow-hidden">
        
        <!-- User Gesture Required Overlay -->
        <div id="startOverlay" class="absolute inset-0 flex flex-col items-center justify-center space-y-6 z-50 bg-black">
            <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center">
                <img src="./icons/aperture.png" alt="" class="start-icon" draggable="false">
            </div>
            <div class="text-center px-6">
                <h1 class="text-xl font-bold tracking-widest uppercase mb-2">Volumetric Time</h1>
                <p class="text-xs text-neutral-500 uppercase tracking-widest mb-8">Long Exposure Interface</p>
                <button id="initBtn" class="px-12 py-4 bg-white text-black rounded-full font-black uppercase tracking-tighter active:scale-95 transition-transform">
                    Initialize System
                </button>
            </div>
        </div>

        <!-- Error State -->
        <div id="error-view" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black p-8 text-center z-50">
            <div class="text-red-500 text-5xl mb-4">⚠️</div>
            <h2 class="text-2xl font-bold">Hardware Connection Failed</h2>
            <p id="error-msg" class="text-neutral-400 mt-4 max-w-xs text-sm">Could not access camera.</p>
            <button onclick="window.location.reload()" class="mt-8 px-8 py-3 bg-neutral-800 text-white rounded-full font-bold uppercase tracking-wider text-xs">
                Tap to Retry
            </button>
        </div>
        
        <!-- Main Stack Canvas -->
        <canvas id="stackCanvas"></canvas>
        <img id="reviewImage" class="hidden" alt="Captured long exposure" draggable="false">

        <!-- Recording HUD -->
        <div id="hud" class="hidden absolute top-8 left-8 flex items-center space-x-3 bg-red-600 px-5 py-2.5 rounded-full animate-pulse shadow-2xl z-20">
            <div class="w-3 h-3 bg-white rounded-full"></div>
            <span class="text-xs font-black uppercase tracking-[0.2em]">Recording</span>
        </div>

        <button id="settingsBtn" class="absolute top-6 left-6 w-12 h-12 rounded-full bg-black/80 border border-white/10 text-white shadow-2xl z-20 flex items-center justify-center active:scale-95 transition-transform" aria-label="Open settings">
            <img src="./icons/settings.png" alt="" class="overlay-icon" draggable="false">
        </button>

        <button id="closePreviewBtn" class="hidden absolute top-6 right-6 w-12 h-12 rounded-full bg-black/80 border border-white/10 text-white shadow-2xl z-20 flex items-center justify-center active:scale-95 transition-transform" aria-label="Close result and return to preview">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M6 6l12 12"></path>
                <path d="M18 6L6 18"></path>
            </svg>
        </button>

        <div id="settingsPanel" class="hidden fixed inset-0 z-50">
            <button id="settingsBackdrop" class="absolute inset-0 bg-black/70" aria-label="Close settings"></button>
            <div class="settings-scroll">
                <div class="settings-card rounded-3xl border border-white/10 bg-neutral-950/95 backdrop-blur-md shadow-2xl p-6">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-sm font-black uppercase tracking-[0.2em] text-white">Settings</h2>
                        <button id="closeSettingsBtn" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center active:scale-95 transition-transform" aria-label="Close settings">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <path d="M6 6l12 12"></path>
                                <path d="M18 6L6 18"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="space-y-4">
                        <label class="block rounded-2xl border border-white/5 bg-white/[0.03] p-4">
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-[11px] font-black uppercase tracking-[0.18em] text-white">Blend</span>
                                <span id="stackBlendModeValue" class="text-[11px] uppercase tracking-[0.18em] text-neutral-400">Brightest</span>
                            </div>
                            <select id="stackBlendModeSelect" class="mt-3 w-full rounded-2xl border border-white/10 bg-black/60 px-4 py-3 text-sm text-white outline-none">
                                <option value="lighten">Brightest</option>
                                <option value="mean">Mean</option>
                                <option value="median">Median</option>
                            </select>
                        </label>

                        <label id="stackOpacityField" class="block rounded-2xl border border-white/5 bg-white/[0.03] p-4">
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-[11px] font-black uppercase tracking-[0.18em] text-white">Strength</span>
                                <span id="stackOpacityValue" class="text-[11px] uppercase tracking-[0.18em] text-neutral-400">100%</span>
                            </div>
                            <input id="stackOpacitySlider" type="range" min="5" max="100" step="1" value="100" class="mt-3 w-full accent-white">
                        </label>

                        <label id="medianFrameCountField" class="hidden block rounded-2xl border border-white/5 bg-white/[0.03] p-4">
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-[11px] font-black uppercase tracking-[0.18em] text-white">Median Frames</span>
                                <span id="medianFrameCountValue" class="text-[11px] uppercase tracking-[0.18em] text-neutral-400">3</span>
                            </div>
                            <input id="medianFrameCountSlider" type="range" min="3" max="7" step="2" value="3" class="mt-3 w-full accent-white">
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div id="imageFolderPanel" class="hidden fixed inset-0 z-50">
            <button id="imageFolderBackdrop" class="absolute inset-0 bg-black/75" aria-label="Close image folder"></button>
            <section class="absolute inset-x-0 bottom-0 max-h-[78vh] overflow-hidden rounded-t-[2rem] border-t border-white/10 bg-neutral-950/95 backdrop-blur-md shadow-2xl">
                <div class="flex items-center justify-between gap-4 border-b border-white/10 px-5 py-4">
                    <h2 class="text-sm font-black uppercase tracking-[0.2em] text-white">Image Folder</h2>
                    <button id="closeImageFolderBtn" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center active:scale-95 transition-transform" aria-label="Close image folder">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <path d="M6 6l12 12"></path>
                            <path d="M18 6L6 18"></path>
                        </svg>
                    </button>
                </div>
                <div class="max-h-[calc(78vh-73px)] overflow-y-auto p-4 pb-8">
                    <p id="imageFolderEmpty" class="py-12 text-center text-[11px] font-black uppercase tracking-[0.18em] text-neutral-500">No captures yet</p>
                    <div id="imageFolderGrid" class="image-folder-grid"></div>
                </div>
            </section>
        </div>
    </div>

    <!-- Controls -->
    <div class="w-full bg-neutral-950 p-8 flex items-center justify-between border-t border-white/5 pb-14 z-30 max-w-3xl mx-auto">
        
        <button id="imageFolderBtn" class="group flex flex-col items-center space-y-2 active:scale-90 transition-transform" aria-label="Open image folder">
            <div class="relative p-5 rounded-2xl bg-neutral-900 text-neutral-500 border border-white/5">
                <img src="./icons/gallery.png" alt="" class="control-icon" draggable="false">
                <span id="imageFolderCount" class="hidden absolute -right-2 -top-2 min-w-5 rounded-full bg-white px-1.5 py-0.5 text-center text-[10px] font-black leading-none text-black">0</span>
            </div>
            <span class="text-[9px] uppercase tracking-widest font-bold text-neutral-600">Folder</span>
        </button>

        <div class="relative">
            <div id="pingRing" class="hidden active-ring"></div>
            <button id="triggerBtn" class="shutter-button rounded-full bg-white text-black relative z-10 flex items-center justify-center active:scale-95 transition-all" aria-label="Start capture" aria-pressed="false">
                <span class="shutter-stop-symbol" aria-hidden="true"></span>
            </button>
        </div>

        <button id="saveBtn" class="group flex flex-col items-center space-y-2 active:scale-90 transition-transform">
            <div class="p-5 rounded-2xl bg-neutral-900 text-neutral-500 border border-white/5">
                <img src="./icons/download.png" alt="" class="control-icon" draggable="false">
            </div>
            <span class="text-[9px] uppercase tracking-widest font-bold text-neutral-600">Download</span>
        </button>
    </div>

    <!-- Hidden Video and Buffer -->
    <video id="sourceVideo" autoplay playsinline muted></video>
    <canvas id="bufferCanvas" style="display:none;"></canvas>
    <canvas id="blendCanvas" style="display:none;"></canvas>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div class="absolute bottom-4 text-[9px] text-neutral-700 uppercase tracking-[0.4em] w-full text-center pointer-events-none font-bold">
        Luminous Sculpture Interface v1.4
    </div>

    <script>
        const STATES = {
            IDLE: 'idle',
            PREVIEW: 'preview',
            CAPTURING: 'capturing',
            REVIEW: 'review'
        };

        const video = document.getElementById('sourceVideo');
        const canvas = document.getElementById('stackCanvas');
        const reviewImage = document.getElementById('reviewImage');
        const ctx = canvas.getContext('2d', { alpha: false });

        // Secondary canvas to fix iOS lighten issues
        const bufferCanvas = document.getElementById('bufferCanvas');
        const bufferCtx = bufferCanvas.getContext('2d', { alpha: false, willReadFrequently: true });
        const blendCanvas = document.getElementById('blendCanvas');
        const blendCtx = blendCanvas.getContext('2d', { alpha: false, willReadFrequently: true });

        const initBtn = document.getElementById('initBtn');
        const startOverlay = document.getElementById('startOverlay');
        const triggerBtn = document.getElementById('triggerBtn');
        const imageFolderBtn = document.getElementById('imageFolderBtn');
        const imageFolderCount = document.getElementById('imageFolderCount');
        const imageFolderPanel = document.getElementById('imageFolderPanel');
        const imageFolderBackdrop = document.getElementById('imageFolderBackdrop');
        const closeImageFolderBtn = document.getElementById('closeImageFolderBtn');
        const imageFolderGrid = document.getElementById('imageFolderGrid');
        const imageFolderEmpty = document.getElementById('imageFolderEmpty');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsBackdrop = document.getElementById('settingsBackdrop');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const stackBlendModeSelect = document.getElementById('stackBlendModeSelect');
        const stackBlendModeValue = document.getElementById('stackBlendModeValue');
        const stackOpacityField = document.getElementById('stackOpacityField');
        const stackOpacitySlider = document.getElementById('stackOpacitySlider');
        const stackOpacityValue = document.getElementById('stackOpacityValue');
        const medianFrameCountField = document.getElementById('medianFrameCountField');
        const medianFrameCountSlider = document.getElementById('medianFrameCountSlider');
        const medianFrameCountValue = document.getElementById('medianFrameCountValue');
        const closePreviewBtn = document.getElementById('closePreviewBtn');
        const saveBtn = document.getElementById('saveBtn');
        const hud = document.getElementById('hud');
        const errorView = document.getElementById('error-view');
        const errorMsg = document.getElementById('error-msg');
        const pingRing = document.getElementById('pingRing');
        const toast = document.getElementById('toast');

        const cameraProfiles = [
            {
                video: {
                    facingMode: { ideal: 'environment' },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            },
            {
                video: {
                    facingMode: { ideal: 'environment' }
                },
                audio: false
            },
            {
                video: true,
                audio: false
            }
        ];

        let captureState = STATES.IDLE;
        let mediaStream = null;
        let animationFrameId = 0;
        let isStarting = false;
        let reviewImageUrl = null;
        let currentCapture = null;
        let imageFolderDbPromise = null;
        let imageFolder = [];
        let toastTimeoutId = 0;
        const supportsCaptureSharing = typeof navigator.share === 'function' && typeof navigator.canShare === 'function' && typeof File === 'function';
        const IMAGE_FOLDER_DB_NAME = 'time-volume-camera-image-folder';
        const IMAGE_FOLDER_DB_VERSION = 1;
        const IMAGE_FOLDER_STORE_NAME = 'captures';
        const STACK_BLEND_MODES = {
            lighten: {
                label: 'Brightest',
                composite: 'lighten',
                opacity: 1,
                processor: 'raw'
            },
            mean: {
                label: 'Mean',
                composite: 'source-over',
                opacity: 1,
                processor: 'mean'
            },
            median: {
                label: 'Median',
                composite: 'lighten',
                opacity: 1,
                processor: 'median'
            }
        };
        let stackBlendModeKey = 'lighten';
        let stackBlendMode = STACK_BLEND_MODES.lighten.composite;
        let stackFrameOpacity = STACK_BLEND_MODES.lighten.opacity;
        let stackFrameProcessor = STACK_BLEND_MODES.lighten.processor;
        let stackMedianFrameCount = 3;
        let stackFrameHistory = [];
        let stackMeanAccumulator = null;
        let stackMeanFrameCount = 0;

        function setButtonDisabled(button, disabled) {
            button.disabled = disabled;
            button.classList.toggle('opacity-40', disabled);
            button.classList.toggle('pointer-events-none', disabled);
        }

        function showToast(message) {
            window.clearTimeout(toastTimeoutId);
            toast.textContent = message;
            toast.classList.add('is-visible');
            toastTimeoutId = window.setTimeout(() => {
                toast.classList.remove('is-visible');
            }, 2200);
        }

        function createCaptureRecord(blob) {
            const createdAt = Date.now();
            const idSuffix = Math.random().toString(36).slice(2, 8);

            return {
                id: `capture-${createdAt}-${idSuffix}`,
                createdAt,
                fileName: `time-volume-${createdAt}.jpg`,
                blob
            };
        }

        function createImageFolderEntry(record) {
            return {
                id: record.id,
                createdAt: record.createdAt,
                fileName: record.fileName,
                blob: record.blob,
                objectUrl: URL.createObjectURL(record.blob)
            };
        }

        function createStorageRecord(record) {
            return {
                id: record.id,
                createdAt: record.createdAt,
                fileName: record.fileName,
                blob: record.blob
            };
        }

        function revokeImageFolderEntry(entry) {
            if (entry && entry.objectUrl) {
                URL.revokeObjectURL(entry.objectUrl);
            }
        }

        function openImageFolderDb() {
            if (!('indexedDB' in window)) {
                return Promise.reject(new Error('This browser does not support in-app image storage.'));
            }

            if (imageFolderDbPromise) {
                return imageFolderDbPromise;
            }

            imageFolderDbPromise = new Promise((resolve, reject) => {
                const request = indexedDB.open(IMAGE_FOLDER_DB_NAME, IMAGE_FOLDER_DB_VERSION);

                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains(IMAGE_FOLDER_STORE_NAME)) {
                        const store = db.createObjectStore(IMAGE_FOLDER_STORE_NAME, { keyPath: 'id' });
                        store.createIndex('createdAt', 'createdAt', { unique: false });
                    }
                };

                request.onerror = () => {
                    reject(request.error || new Error('Could not open the image folder.'));
                    imageFolderDbPromise = null;
                };

                request.onsuccess = () => {
                    resolve(request.result);
                };
            });

            return imageFolderDbPromise;
        }

        async function readStoredImageFolder() {
            const db = await openImageFolderDb();

            return new Promise((resolve, reject) => {
                const transaction = db.transaction(IMAGE_FOLDER_STORE_NAME, 'readonly');
                const store = transaction.objectStore(IMAGE_FOLDER_STORE_NAME);
                const request = store.getAll();

                request.onsuccess = () => {
                    resolve(request.result || []);
                };

                request.onerror = () => {
                    reject(request.error || new Error('Could not read the image folder.'));
                };

                transaction.onerror = () => {
                    reject(transaction.error || new Error('Could not read the image folder.'));
                };
            });
        }

        async function persistImageFolderRecord(record) {
            const db = await openImageFolderDb();

            return new Promise((resolve, reject) => {
                const transaction = db.transaction(IMAGE_FOLDER_STORE_NAME, 'readwrite');
                const store = transaction.objectStore(IMAGE_FOLDER_STORE_NAME);
                const request = store.put(createStorageRecord(record));

                request.onerror = () => {
                    reject(request.error || new Error('Could not add this capture to the image folder.'));
                };

                transaction.oncomplete = () => {
                    resolve();
                };

                transaction.onerror = () => {
                    reject(transaction.error || new Error('Could not add this capture to the image folder.'));
                };
            });
        }

        async function deleteStoredImageFolderRecord(id) {
            const db = await openImageFolderDb();

            return new Promise((resolve, reject) => {
                const transaction = db.transaction(IMAGE_FOLDER_STORE_NAME, 'readwrite');
                const store = transaction.objectStore(IMAGE_FOLDER_STORE_NAME);
                const request = store.delete(id);

                request.onerror = () => {
                    reject(request.error || new Error('Could not remove this capture from the image folder.'));
                };

                transaction.oncomplete = () => {
                    resolve();
                };

                transaction.onerror = () => {
                    reject(transaction.error || new Error('Could not remove this capture from the image folder.'));
                };
            });
        }

        function formatCaptureTime(createdAt) {
            return new Intl.DateTimeFormat(undefined, {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }).format(new Date(createdAt));
        }

        function createFolderActionButton(action, label, iconPath, extraClass = '') {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = `image-folder-action${extraClass ? ` ${extraClass}` : ''}`;
            button.dataset.folderAction = action;
            button.setAttribute('aria-label', label);

            const icon = document.createElement('img');
            icon.src = iconPath;
            icon.alt = '';
            icon.draggable = false;
            button.appendChild(icon);
            return button;
        }

        function renderImageFolder() {
            imageFolderGrid.replaceChildren();
            imageFolderEmpty.classList.toggle('hidden', imageFolder.length > 0);
            imageFolderCount.textContent = imageFolder.length > 99 ? '99+' : String(imageFolder.length);
            imageFolderCount.classList.toggle('hidden', imageFolder.length === 0);

            imageFolder.forEach((capture) => {
                const card = document.createElement('article');
                card.className = 'image-folder-card';
                card.dataset.captureId = capture.id;

                const previewButton = document.createElement('button');
                previewButton.type = 'button';
                previewButton.className = 'image-folder-preview';
                previewButton.dataset.folderAction = 'review';
                previewButton.setAttribute('aria-label', 'Review capture');

                const image = document.createElement('img');
                image.src = capture.objectUrl;
                image.alt = 'Saved capture';
                image.loading = 'lazy';
                image.draggable = false;
                previewButton.appendChild(image);

                const meta = document.createElement('div');
                meta.className = 'image-folder-meta';

                const time = document.createElement('span');
                time.className = 'image-folder-time';
                time.textContent = formatCaptureTime(capture.createdAt);

                const actions = document.createElement('div');
                actions.className = 'image-folder-actions';
                actions.appendChild(createFolderActionButton('save', 'Save capture', './icons/download.png'));
                actions.appendChild(createFolderActionButton('delete', 'Remove capture', './icons/delete.png', 'danger'));

                meta.appendChild(time);
                meta.appendChild(actions);
                card.appendChild(previewButton);
                card.appendChild(meta);
                imageFolderGrid.appendChild(card);
            });
        }

        async function loadImageFolder() {
            try {
                const records = await readStoredImageFolder();
                const existingEntries = new Map(imageFolder.map((entry) => [entry.id, entry]));
                const storedIds = new Set(records.map((record) => record.id));
                const storedEntries = records.map((record) => existingEntries.get(record.id) || createImageFolderEntry(record));
                const sessionEntries = imageFolder.filter((entry) => !storedIds.has(entry.id));
                imageFolder = [...storedEntries, ...sessionEntries]
                    .sort((first, second) => second.createdAt - first.createdAt);
                renderImageFolder();
            } catch (error) {
                console.warn('Image Folder Load Error:', error);
                renderImageFolder();
            }
        }

        function addCaptureToImageFolder(record) {
            const entry = createImageFolderEntry(record);
            imageFolder.unshift(entry);
            renderImageFolder();

            persistImageFolderRecord(record).catch((error) => {
                console.warn('Image Folder Save Error:', error);
                showToast('Stored for this session only');
            });

            return entry;
        }

        function findImageFolderCapture(id) {
            return imageFolder.find((capture) => capture.id === id) || null;
        }

        function openImageFolder() {
            if (captureState === STATES.CAPTURING) {
                return;
            }

            imageFolderPanel.classList.remove('hidden');
        }

        function closeImageFolder() {
            imageFolderPanel.classList.add('hidden');
        }

        function syncStackSettingsUi() {
            const mode = STACK_BLEND_MODES[stackBlendModeKey] || STACK_BLEND_MODES.lighten;
            stackBlendModeSelect.value = stackBlendModeKey;
            stackBlendModeValue.textContent = mode.label;
            stackOpacitySlider.value = String(Math.round(stackFrameOpacity * 100));
            stackOpacityValue.textContent = `${Math.round(stackFrameOpacity * 100)}%`;
            stackOpacityField.classList.toggle('hidden', stackFrameProcessor === 'mean');
            medianFrameCountField.classList.toggle('hidden', stackFrameProcessor !== 'median');
            medianFrameCountSlider.value = String(stackMedianFrameCount);
            medianFrameCountValue.textContent = String(stackMedianFrameCount);
        }

        function resetStackFrameHistory() {
            stackFrameHistory = [];
            stackMeanAccumulator = null;
            stackMeanFrameCount = 0;
        }

        function copyFramePixels(sourcePixels) {
            return new Uint8ClampedArray(sourcePixels);
        }

        function buildPreviousCurrentMeanFrame(currentPixels) {
            const previousPixels = stackFrameHistory.length ? stackFrameHistory[stackFrameHistory.length - 1] : null;

            if (!previousPixels) {
                return null;
            }

            const output = blendCtx.createImageData(bufferCanvas.width, bufferCanvas.height);
            const outputPixels = output.data;

            for (let index = 0; index < currentPixels.length; index += 4) {
                outputPixels[index] = Math.round((previousPixels[index] + currentPixels[index]) * 0.5);
                outputPixels[index + 1] = Math.round((previousPixels[index + 1] + currentPixels[index + 1]) * 0.5);
                outputPixels[index + 2] = Math.round((previousPixels[index + 2] + currentPixels[index + 2]) * 0.5);
                outputPixels[index + 3] = 255;
            }

            return output;
        }

        function buildMeanFrame(currentPixels) {
            const pixelCount = currentPixels.length / 4;

            if (!stackMeanAccumulator || stackMeanAccumulator.length !== pixelCount * 3) {
                stackMeanAccumulator = new Float32Array(pixelCount * 3);
                stackMeanFrameCount = 0;
            }

            stackMeanFrameCount += 1;

            const output = blendCtx.createImageData(bufferCanvas.width, bufferCanvas.height);
            const outputPixels = output.data;
            const previousWeight = (stackMeanFrameCount - 1) / stackMeanFrameCount;
            const currentWeight = 1 / stackMeanFrameCount;

            for (let index = 0, accumulatorIndex = 0; index < currentPixels.length; index += 4, accumulatorIndex += 3) {
                const redMean = (stackMeanAccumulator[accumulatorIndex] * previousWeight) + (currentPixels[index] * currentWeight);
                const greenMean = (stackMeanAccumulator[accumulatorIndex + 1] * previousWeight) + (currentPixels[index + 1] * currentWeight);
                const blueMean = (stackMeanAccumulator[accumulatorIndex + 2] * previousWeight) + (currentPixels[index + 2] * currentWeight);

                stackMeanAccumulator[accumulatorIndex] = redMean;
                stackMeanAccumulator[accumulatorIndex + 1] = greenMean;
                stackMeanAccumulator[accumulatorIndex + 2] = blueMean;

                outputPixels[index] = Math.round(redMean);
                outputPixels[index + 1] = Math.round(greenMean);
                outputPixels[index + 2] = Math.round(blueMean);
                outputPixels[index + 3] = 255;
            }

            return output;
        }

        function buildMedianFrame(currentPixels) {
            const medianFrames = stackFrameHistory.slice(-(stackMedianFrameCount - 1));

            if (medianFrames.length < (stackMedianFrameCount - 1)) {
                return buildPreviousCurrentMeanFrame(currentPixels);
            }

            const sourceFrames = [...medianFrames, currentPixels];
            const output = blendCtx.createImageData(bufferCanvas.width, bufferCanvas.height);
            const outputPixels = output.data;

            for (let index = 0; index < currentPixels.length; index += 4) {
                const redSamples = sourceFrames.map((frame) => frame[index]).sort((a, b) => a - b);
                const greenSamples = sourceFrames.map((frame) => frame[index + 1]).sort((a, b) => a - b);
                const blueSamples = sourceFrames.map((frame) => frame[index + 2]).sort((a, b) => a - b);
                const middleIndex = Math.floor(sourceFrames.length / 2);

                outputPixels[index] = redSamples[middleIndex];
                outputPixels[index + 1] = greenSamples[middleIndex];
                outputPixels[index + 2] = blueSamples[middleIndex];
                outputPixels[index + 3] = 255;
            }

            return output;
        }

        function buildStackFrameSource() {
            if (stackFrameProcessor === 'raw') {
                return bufferCanvas;
            }

            const currentFrame = bufferCtx.getImageData(0, 0, bufferCanvas.width, bufferCanvas.height);
            const currentPixels = currentFrame.data;
            const processedFrame = stackFrameProcessor === 'median'
                ? buildMedianFrame(currentPixels)
                : buildMeanFrame(currentPixels);

            if (processedFrame) {
                blendCtx.putImageData(processedFrame, 0, 0);
            } else {
                blendCtx.putImageData(currentFrame, 0, 0);
            }

            if (stackFrameProcessor === 'median') {
                stackFrameHistory.push(copyFramePixels(currentPixels));

                while (stackFrameHistory.length > stackMedianFrameCount) {
                    stackFrameHistory.shift();
                }
            }

            return blendCanvas;
        }

        function clearReviewImage() {
            reviewImage.classList.add('hidden');
            reviewImage.style.display = 'none';
            reviewImage.removeAttribute('src');
            canvas.classList.remove('hidden');
            canvas.style.display = 'block';

            if (!reviewImageUrl) {
                return;
            }

            URL.revokeObjectURL(reviewImageUrl);
            reviewImageUrl = null;
        }

        function showReviewImage(blob) {
            clearReviewImage();
            reviewImageUrl = URL.createObjectURL(blob);
            reviewImage.src = reviewImageUrl;
            reviewImage.classList.remove('hidden');
            reviewImage.style.display = 'block';
            canvas.classList.add('hidden');
            canvas.style.display = 'none';
        }

        function isAppleMobileDevice() {
            const userAgent = navigator.userAgent || '';
            const platform = navigator.platform || '';
            const hasTouchMac = (platform === 'MacIntel' || platform === 'Macintosh') && navigator.maxTouchPoints > 1;
            return /iPhone|iPad|iPod/.test(userAgent) || hasTouchMac;
        }

        function syncUi() {
            const isReady = Boolean(mediaStream) && canvas.width > 0 && canvas.height > 0;
            const isRecording = captureState === STATES.CAPTURING;
            const hasCapture = captureState === STATES.REVIEW;

            setButtonDisabled(triggerBtn, !isReady || isStarting);
            setButtonDisabled(imageFolderBtn, isStarting || isRecording);
            setButtonDisabled(saveBtn, !hasCapture || isStarting);

            triggerBtn.classList.toggle('bg-red-600', isRecording);
            triggerBtn.classList.toggle('text-white', isRecording);
            triggerBtn.classList.toggle('bg-white', !isRecording);
            triggerBtn.classList.toggle('text-black', !isRecording);
            triggerBtn.setAttribute('aria-label', isRecording ? 'Stop capture' : 'Start capture');
            triggerBtn.setAttribute('aria-pressed', String(isRecording));
            triggerBtn.classList.toggle('is-recording', isRecording);
            hud.classList.toggle('hidden', !isRecording);
            pingRing.classList.toggle('hidden', !isRecording);
            closePreviewBtn.classList.toggle('hidden', !hasCapture);
        }

        function openSettings() {
            settingsPanel.classList.remove('hidden');
        }

        function closeSettings() {
            settingsPanel.classList.add('hidden');
        }

        function clearCompositeCanvas() {
            if (!canvas.width || !canvas.height) {
                return;
            }

            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1;
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            resetStackFrameHistory();
        }

        function startRenderLoop() {
            if (animationFrameId) {
                return;
            }

            const tick = () => {
                drawFrame();
                animationFrameId = requestAnimationFrame(tick);
            };

            tick();
        }

        function stopRenderLoop() {
            if (!animationFrameId) {
                return;
            }

            cancelAnimationFrame(animationFrameId);
            animationFrameId = 0;
        }

        function setState(nextState) {
            captureState = nextState;

            if (captureState === STATES.REVIEW) {
                stopRenderLoop();
            } else if (mediaStream) {
                currentCapture = null;
                clearReviewImage();
                startRenderLoop();
            } else {
                currentCapture = null;
            }

            syncUi();
        }

        async function shareCapture(blob, fileName) {
            if (!supportsCaptureSharing) {
                return false;
            }

            const file = new File([blob], fileName, { type: blob.type });

            if (!navigator.canShare({ files: [file] })) {
                return false;
            }

            await navigator.share({
                files: [file],
                title: 'Volumetric Time Capture'
            });

            return true;
        }

        function shouldUseNativeImageSave() {
            const userAgent = navigator.userAgent || '';
            return isAppleMobileDevice() || /Android/i.test(userAgent);
        }

        async function saveCaptureBlob(blob, fileName) {
            if (shouldUseNativeImageSave()) {
                const didShare = await shareCapture(blob, fileName);
                if (didShare) {
                    return;
                }
            }

            downloadBlob(blob, fileName);
        }

        function showError(message) {
            startOverlay.classList.add('hidden');
            errorView.classList.remove('hidden');
            errorMsg.innerText = message;
        }

        function describeCameraError(error) {
            switch (error.name) {
                case 'NotAllowedError':
                    return 'Camera permission was denied. Please allow access and try again.';
                case 'NotFoundError':
                    return 'No camera was found on this device.';
                case 'NotReadableError':
                    return 'The camera is already in use by another app.';
                case 'OverconstrainedError':
                    return 'This device could not match the requested camera settings.';
                case 'SecurityError':
                    return 'Camera access requires HTTPS or localhost.';
                default:
                    return error.message || 'Could not access the camera.';
            }
        }

        function waitForVideoReady(timeoutMs = 10000) {
            if (video.videoWidth && video.videoHeight) {
                return Promise.resolve();
            }

            return new Promise((resolve, reject) => {
                const timeoutId = window.setTimeout(() => {
                    cleanup();
                    reject(new Error('Camera preview timed out.'));
                }, timeoutMs);

                function cleanup() {
                    window.clearTimeout(timeoutId);
                    video.removeEventListener('loadedmetadata', handleReady);
                    video.removeEventListener('playing', handleReady);
                    video.removeEventListener('error', handleError);
                }

                function handleReady() {
                    if (!video.videoWidth || !video.videoHeight) {
                        return;
                    }

                    cleanup();
                    resolve();
                }

                function handleError() {
                    cleanup();
                    reject(new Error('Camera preview could not start.'));
                }

                video.addEventListener('loadedmetadata', handleReady);
                video.addEventListener('playing', handleReady);
                video.addEventListener('error', handleError);
            });
        }

        async function requestCameraStream() {
            let lastError = null;

            for (const constraints of cameraProfiles) {
                try {
                    return await navigator.mediaDevices.getUserMedia(constraints);
                } catch (error) {
                    lastError = error;
                    if (error.name !== 'OverconstrainedError' && error.name !== 'NotFoundError') {
                        throw error;
                    }
                }
            }

            throw lastError || new Error('Could not access the camera.');
        }

        function drawFrame() {
            if (!mediaStream || video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
                return;
            }

            bufferCtx.globalCompositeOperation = 'source-over';
            bufferCtx.drawImage(video, 0, 0, bufferCanvas.width, bufferCanvas.height);

            if (captureState === STATES.PREVIEW) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;
                ctx.drawImage(bufferCanvas, 0, 0, canvas.width, canvas.height);
            } else if (captureState === STATES.CAPTURING) {
                const stackFrameSource = buildStackFrameSource();
                const frameOpacity = stackFrameProcessor === 'mean' ? 1 : stackFrameOpacity;
                ctx.globalCompositeOperation = stackBlendMode;
                ctx.globalAlpha = frameOpacity;
                ctx.drawImage(stackFrameSource, 0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
            }
        }

        function stopStream() {
            if (!mediaStream) {
                return;
            }

            mediaStream.getTracks().forEach((track) => track.stop());
            mediaStream = null;
            video.srcObject = null;
        }

        async function startSystem() {
            if (isStarting || mediaStream) {
                return;
            }

            if (!window.isSecureContext) {
                showError('Camera access requires HTTPS or localhost. If you are opening this from the Raspberry Pi over a local IP address, the page needs to be served securely.');
                return;
            }

            if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
                showError('This browser does not support live camera capture. Try a recent version of Safari or Chrome.');
                return;
            }

            isStarting = true;
            syncUi();

            try {
                mediaStream = await requestCameraStream();
                const readyPromise = waitForVideoReady();
                video.srcObject = mediaStream;
                await Promise.all([readyPromise, video.play()]);

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                bufferCanvas.width = video.videoWidth;
                bufferCanvas.height = video.videoHeight;
                blendCanvas.width = video.videoWidth;
                blendCanvas.height = video.videoHeight;

                clearCompositeCanvas();
                errorView.classList.add('hidden');
                startOverlay.classList.add('hidden');
                setState(STATES.PREVIEW);
                drawFrame();
            } catch (error) {
                console.error('Camera Error:', error);
                stopStream();
                setState(STATES.IDLE);
                showError(describeCameraError(error));
            } finally {
                isStarting = false;
                syncUi();
            }
        }

        function startCapture() {
            if (!mediaStream || !canvas.width || !canvas.height) {
                return;
            }

            clearCompositeCanvas();
            setState(STATES.CAPTURING);
        }

        async function stopCapture() {
            if (captureState !== STATES.CAPTURING) {
                return;
            }

            setState(STATES.REVIEW);

            try {
                const blob = await canvasToBlob(canvas, 'image/jpeg', 0.92);
                const captureRecord = createCaptureRecord(blob);
                currentCapture = addCaptureToImageFolder(captureRecord);
                showReviewImage(blob);
                showToast('Added to Folder');
            } catch (error) {
                console.error('Review Image Error:', error);
            }
        }

        function closeReviewCapture() {
            if (captureState !== STATES.REVIEW) {
                return;
            }

            clearReviewImage();
            currentCapture = null;

            if (mediaStream) {
                setState(STATES.PREVIEW);
                drawFrame();
            } else {
                startOverlay.classList.remove('hidden');
                setState(STATES.IDLE);
            }
        }

        function canvasToBlob(targetCanvas, type, quality) {
            return new Promise((resolve, reject) => {
                targetCanvas.toBlob((blob) => {
                    if (!blob) {
                        reject(new Error('Could not create an image from the current capture.'));
                        return;
                    }

                    resolve(blob);
                }, type, quality);
            });
        }

        function downloadBlob(blob, fileName) {
            const objectUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = fileName;
            link.href = objectUrl;
            link.target = '_blank';
            link.rel = 'noopener';
            document.body.appendChild(link);
            link.click();
            link.remove();
            window.setTimeout(() => URL.revokeObjectURL(objectUrl), 60000);
        }

        function reviewImageFolderCapture(capture) {
            if (!capture || captureState === STATES.CAPTURING) {
                return;
            }

            closeImageFolder();
            startOverlay.classList.add('hidden');
            errorView.classList.add('hidden');
            currentCapture = capture;
            setState(STATES.REVIEW);
            currentCapture = capture;
            showReviewImage(capture.blob);
            syncUi();
        }

        async function saveImageFolderCapture(capture) {
            if (!capture) {
                return;
            }

            try {
                await saveCaptureBlob(capture.blob, capture.fileName);
                showToast('Saved JPG');
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error('Save Error:', error);
                    showToast('Could not save JPG');
                }
            }
        }

        async function deleteImageFolderCapture(id) {
            const index = imageFolder.findIndex((capture) => capture.id === id);
            if (index === -1) {
                return;
            }

            const [removedCapture] = imageFolder.splice(index, 1);
            revokeImageFolderEntry(removedCapture);
            renderImageFolder();

            if (currentCapture && currentCapture.id === id && captureState === STATES.REVIEW) {
                clearReviewImage();
                currentCapture = null;

                if (mediaStream) {
                    setState(STATES.PREVIEW);
                    drawFrame();
                } else {
                    startOverlay.classList.remove('hidden');
                    setState(STATES.IDLE);
                }
            }

            try {
                await deleteStoredImageFolderRecord(id);
                showToast('Removed from Folder');
            } catch (error) {
                console.warn('Image Folder Delete Error:', error);
                showToast('Could not update Folder');
            }
        }

        function handleImageFolderClick(event) {
            if (!(event.target instanceof Element)) {
                return;
            }

            const actionTarget = event.target.closest('[data-folder-action]');
            if (!actionTarget) {
                return;
            }

            const card = actionTarget.closest('[data-capture-id]');
            if (!card) {
                return;
            }

            const capture = findImageFolderCapture(card.dataset.captureId);
            if (!capture) {
                return;
            }

            if (actionTarget.dataset.folderAction === 'review') {
                reviewImageFolderCapture(capture);
            } else if (actionTarget.dataset.folderAction === 'save') {
                saveImageFolderCapture(capture);
            } else if (actionTarget.dataset.folderAction === 'delete') {
                deleteImageFolderCapture(capture.id);
            }
        }

        async function saveCapture() {
            if (captureState !== STATES.REVIEW || saveBtn.disabled) {
                return;
            }

            setButtonDisabled(saveBtn, true);

            try {
                const blob = currentCapture ? currentCapture.blob : await canvasToBlob(canvas, 'image/jpeg', 0.92);
                const fileName = currentCapture ? currentCapture.fileName : `time-volume-${Date.now()}.jpg`;
                await saveCaptureBlob(blob, fileName);
                showToast('Saved JPG');
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error('Save Error:', error);
                    showToast('Could not save JPG');
                }
            } finally {
                syncUi();
            }
        }

        function handleTriggerClick() {
            if (captureState === STATES.CAPTURING) {
                stopCapture();
                return;
            }

            startCapture();
        }

        function handleVisibilityChange() {
            if (document.hidden) {
                stopRenderLoop();
                return;
            }

            if (mediaStream && captureState !== STATES.REVIEW) {
                video.play().catch(() => {});
                startRenderLoop();
                if (captureState === STATES.PREVIEW) {
                    drawFrame();
                }
            }
        }

        function teardownCamera() {
            closeSettings();
            closeImageFolder();
            clearReviewImage();
            stopRenderLoop();
            stopStream();
        }

        function handleStackBlendModeChange() {
            const nextMode = STACK_BLEND_MODES[stackBlendModeSelect.value];
            if (!nextMode) {
                return;
            }

            stackBlendModeKey = stackBlendModeSelect.value;
            stackBlendMode = nextMode.composite;
            stackFrameOpacity = nextMode.opacity;
            stackFrameProcessor = nextMode.processor;
            resetStackFrameHistory();
            syncStackSettingsUi();
        }

        function handleStackOpacityInput() {
            stackFrameOpacity = Number(stackOpacitySlider.value) / 100;
            stackOpacityValue.textContent = `${Math.round(stackFrameOpacity * 100)}%`;
        }

        function handleMedianFrameCountInput() {
            stackMedianFrameCount = Number(medianFrameCountSlider.value);
            medianFrameCountValue.textContent = String(stackMedianFrameCount);
            resetStackFrameHistory();
        }

        initBtn.addEventListener('click', startSystem);
        triggerBtn.addEventListener('click', handleTriggerClick);
        imageFolderBtn.addEventListener('click', openImageFolder);
        imageFolderBackdrop.addEventListener('click', closeImageFolder);
        closeImageFolderBtn.addEventListener('click', closeImageFolder);
        imageFolderGrid.addEventListener('click', handleImageFolderClick);
        settingsBtn.addEventListener('click', openSettings);
        settingsBackdrop.addEventListener('click', closeSettings);
        closeSettingsBtn.addEventListener('click', closeSettings);
        stackBlendModeSelect.addEventListener('change', handleStackBlendModeChange);
        stackOpacitySlider.addEventListener('input', handleStackOpacityInput);
        medianFrameCountSlider.addEventListener('input', handleMedianFrameCountInput);
        closePreviewBtn.addEventListener('click', closeReviewCapture);
        saveBtn.addEventListener('click', saveCapture);
        document.addEventListener('visibilitychange', handleVisibilityChange);
        window.addEventListener('pagehide', teardownCamera);
        window.addEventListener('beforeunload', teardownCamera);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch((error) => {
                    console.error('Service Worker Registration Failed:', error);
                });
            });
        }

        syncStackSettingsUi();
        renderImageFolder();
        loadImageFolder();
        syncUi();
    </script>
</body>
</html>
