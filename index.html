
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Volumetric Time">
    <meta name="description" content="Long-exposure camera interface for the Volumetric Time installation.">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon_32.png">
    <link rel="apple-touch-icon" href="./icons/icon_192.png">
    <title>v1.86 Volumetric Time Camera</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
        #reviewImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            touch-action: auto;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: default;
            -webkit-user-drag: none;
        }
        .active-ring {
            position: absolute;
            inset: -8px;
            border: 2px solid rgba(220, 38, 38, 0.5);
            border-radius: 9999px;
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% { transform: scale(1.4); opacity: 0; }
        }
        .shutter-button {
            width: 7rem;
            height: 7rem;
            padding: 0;
            box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.22), 0 20px 25px -5px rgba(0, 0, 0, 0.22), 0 8px 10px -6px rgba(0, 0, 0, 0.22);
        }
        .shutter-button.is-recording {
            box-shadow: 0 0 0 6px rgba(220, 38, 38, 0.32), 0 25px 50px -12px rgba(220, 38, 38, 0.45);
        }
        .shutter-stop-symbol {
            width: 2.1rem;
            height: 2.1rem;
            border-radius: 0.35rem;
            background: currentColor;
            opacity: 0;
            transform: scale(0.82);
            transition: opacity 140ms ease, transform 140ms ease;
        }
        .shutter-button.is-recording .shutter-stop-symbol {
            opacity: 1;
            transform: scale(1);
        }
        #sourceVideo {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        .control-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
            display: block;
            filter: brightness(0) saturate(100%) invert(43%) sepia(6%) saturate(329%) hue-rotate(183deg) brightness(94%) contrast(86%);
        }
        .overlay-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
            filter: brightness(0) saturate(100%) invert(100%);
        }
        .start-icon {
            width: 44px;
            height: 44px;
            object-fit: contain;
            display: block;
            filter: brightness(0) saturate(100%) invert(100%);
        }
        .settings-scroll {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-y;
            padding-top: max(5rem, calc(env(safe-area-inset-top) + 1.5rem));
            padding-right: 1.5rem;
            padding-bottom: max(2rem, calc(env(safe-area-inset-bottom) + 1.5rem));
            padding-left: 1.5rem;
        }
        .settings-card {
            position: relative;
            max-width: 24rem;
            margin: 0 auto;
        }
        .image-folder-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
        }
        @media (min-width: 640px) {
            .image-folder-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }
        .image-folder-card {
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.04);
        }
        .image-folder-preview {
            width: 100%;
            aspect-ratio: 4 / 3;
            border: 0;
            padding: 0;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-folder-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .image-folder-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.5rem;
        }
        .image-folder-time {
            min-width: 0;
            color: rgb(163, 163, 163);
            font-size: 0.625rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .image-folder-actions {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            flex-shrink: 0;
        }
        .image-folder-action {
            width: 2rem;
            height: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.06);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-folder-action:active {
            transform: scale(0.94);
        }
        .image-folder-action.danger {
            color: rgb(248, 113, 113);
        }
        .image-folder-action img {
            width: 1rem;
            height: 1rem;
            object-fit: contain;
            display: block;
            filter: brightness(0) saturate(100%) invert(100%);
        }
        .image-folder-action.danger img {
            filter: brightness(0) saturate(100%) invert(61%) sepia(59%) saturate(1249%) hue-rotate(314deg) brightness(101%) contrast(94%);
        }
        .toast {
            position: absolute;
            left: 50%;
            bottom: 2rem;
            z-index: 60;
            max-width: min(22rem, calc(100vw - 2rem));
            transform: translate(-50%, 0.5rem);
            opacity: 0;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            background: rgba(10, 10, 10, 0.9);
            padding: 0.75rem 1rem;
            color: white;
            font-size: 0.6875rem;
            font-weight: 900;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            text-align: center;
            transition: opacity 160ms ease, transform 160ms ease;
        }
        .toast.is-visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        .fullscreen-toggle {
            position: absolute;
            right: max(1.5rem, calc(env(safe-area-inset-right) + 1rem));
            bottom: max(1.5rem, calc(env(safe-area-inset-bottom) + 1rem));
            z-index: 25;
            width: 3rem;
            height: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transform: translateY(0.35rem) scale(0.96);
            transition: opacity 160ms ease, transform 160ms ease;
        }
        .fullscreen-toggle.is-visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        .fullscreen-toggle img {
            width: 1.25rem;
            height: 1.25rem;
            object-fit: contain;
            display: block;
            filter: brightness(0) saturate(100%) invert(100%);
        }
        body.camera-fullscreen-active #viewport {
            position: fixed;
            inset: 0;
            z-index: 40;
            width: 100vw;
            height: 100vh;
            flex: none;
            background: black;
        }
        body.camera-fullscreen-active #stackCanvas,
        body.camera-fullscreen-active #reviewImage {
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
        }
        body.camera-fullscreen-active #appControls,
        body.camera-fullscreen-active #cameraFooter,
        body.camera-fullscreen-active #settingsBtn,
        body.camera-fullscreen-active #closePreviewBtn,
        body.camera-fullscreen-active #hud,
        body.camera-fullscreen-active #toast {
            display: none !important;
        }
        body.camera-fullscreen-active .fullscreen-toggle {
            top: max(1.5rem, calc(env(safe-area-inset-top) + 1rem));
            right: max(1.5rem, calc(env(safe-area-inset-right) + 1rem));
            bottom: auto;
        }

        @media screen and (orientation: landscape) and (max-height: 600px) {
            #appContainer {
                flex-direction: row !important;
            }
            #appControls {
                width: auto !important;
                height: 100% !important;
                flex-direction: column-reverse !important;
                border-top: none !important;
                border-left: 1px solid rgba(255, 255, 255, 0.05);
                padding: 1.5rem 2rem !important;
                padding-right: max(2rem, env(safe-area-inset-right)) !important;
                padding-left: max(2rem, env(safe-area-inset-left)) !important;
            }
            #cameraFooter {
                display: none !important;
            }
        }
        #imageFolderPanel {
            transition: visibility 0s 300ms;
        }
        #imageFolderPanel.is-open {
            transition: visibility 0s 0s;
        }
        #imageFolderBackdrop {
            opacity: 0;
            transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        #imageFolderPanel.is-open #imageFolderBackdrop {
            opacity: 1;
        }
        #imageFolderSheet {
            transform: translateY(100%);
            transition: transform 1000ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        #imageFolderPanel.is-open #imageFolderSheet {
            transform: translateY(0);
        }
        .invisible {
            visibility: hidden !important;
            pointer-events: none !important;
        }
        
    </style>
</head>

    <script>
        function updateAppLayout() {
            const app = document.getElementById('appContainer');
            const controls = document.getElementById('appControls');
            
            if (!video || !video.videoWidth || !app || !controls) {
                if (app) {
                    app.style.width = '100%';
                    app.style.height = '100%';
                }
                return;
            }

            if (document.body.classList.contains('camera-fullscreen-active')) {
                app.style.width = '100%';
                app.style.height = '100%';
                return;
            }

            const winW = window.innerWidth;
            const winH = window.innerHeight;

            // Leave layout filling the entire screen for portrait dimensions (mobile)
            // or mobile landscape (height <= 600px)
            if (winH >= winW || (winH <= 600 && winW > winH)) {
                app.style.width = '100%';
                app.style.height = '100%';
                return;
            }

            const aspect = video.videoWidth / video.videoHeight;
            
            // Get the static height of the controls area
            const controlsH = controls.offsetHeight || 0;
            
            // Calculate optimal viewport size maintaining aspect ratio
            let targetViewportH = winH - controlsH;
            let targetW = targetViewportH * aspect;
            
            // If width exceeds screen width, scale by width instead
            if (targetW > winW) {
                targetW = winW;
                targetViewportH = targetW / aspect;
            }
            
            // Apply precise constraints to centralize the app and align UI exactly to camera edges
            app.style.width = Math.floor(targetW) + 'px';
            app.style.height = Math.floor(targetViewportH + controlsH) + 'px';
        }

        const STATES = {
            IDLE: 'idle',
            PREVIEW: 'preview',
            CAPTURING: 'capturing',
            REVIEW: 'review'
        };

        function createStorageRecord(record) {
            return {
                id: record.id,
                createdAt: record.createdAt,
                fileName: record.fileName,
                blob: record.blob,
                downloaded: Boolean(record.downloaded)
            };

        function openImageFolderDb() {
            if (!('indexedDB' in window)) {
                return Promise.reject(new Error('This browser does not support in-app image storage.'));
            }

            if (imageFolderDbPromise) {
                return imageFolderDbPromise;
            }

            imageFolderDbPromise = new Promise((resolve, reject) => {
                const request = indexedDB.open(IMAGE_FOLDER_DB_NAME, IMAGE_FOLDER_DB_VERSION);

                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains(IMAGE_FOLDER_STORE_NAME)) {
                        const store = db.createObjectStore(IMAGE_FOLDER_STORE_NAME, { keyPath: 'id' });
                        store.createIndex('createdAt', 'createdAt', { unique: false });
                    }
                };

                request.onerror = () => {
                    reject(request.error || new Error('Could not open the image folder.'));
                    imageFolderDbPromise = null;
                };

                request.onsuccess = () => {
                    resolve(request.result);
                };
            });

            return imageFolderDbPromise;
        }

        async function readStoredImageFolder() {
            const db = await openImageFolderDb();

            return new Promise((resolve, reject) => {
                const transaction = db.transaction(IMAGE_FOLDER_STORE_NAME, 'readonly');
                const store = transaction.objectStore(IMAGE_FOLDER_STORE_NAME);
                const request = store.getAll();

                request.onsuccess = () => {
                    resolve(request.result || []);
                };

                request.onerror = () => {
                    reject(request.error || new Error('Could not read the image folder.'));
                };

                transaction.onerror = () => {
                    reject(transaction.error || new Error('Could not read the image folder.'));
                };
            });
        }

        async function persistImageFolderRecord(record) {
            const db = await openImageFolderDb();

            return new Promise((resolve, reject) => {
                const transaction = db.transaction(IMAGE_FOLDER_STORE_NAME, 'readwrite');
                const store = transaction.objectStore(IMAGE_FOLDER_STORE_NAME);
                const request = store.put(createStorageRecord(record));

                request.onerror = () => {
                    reject(request.error || new Error('Could not add this capture to the image folder.'));
                };

                transaction.oncomplete = () => {
                    resolve();
                };

                transaction.onerror = () => {
                    reject(transaction.error || new Error('Could not add this capture to the image folder.'));
                };
            });
        }

        async function deleteStoredImageFolderRecord(id) {
            const db = await openImageFolderDb();

            return new Promise((resolve, reject) => {
                const transaction = db.transaction(IMAGE_FOLDER_STORE_NAME, 'readwrite');
                const store = transaction.objectStore(IMAGE_FOLDER_STORE_NAME);
                const request = store.delete(id);

                request.onerror = () => {
                    reject(request.error || new Error('Could not remove this capture from the image folder.'));
                };

                transaction.oncomplete = () => {
                    resolve();
                };

                transaction.onerror = () => {
                    reject(transaction.error || new Error('Could not remove this capture from the image folder.'));
                };
            });
        }

        async function loadImageFolder() {
            try {
                const records = await readStoredImageFolder();
                const existingEntries = new Map(imageFolder.map((entry) => [entry.id, entry]));
                const storedIds = new Set(records.map((record) => record.id));
                const storedEntries = records.map((record) => existingEntries.get(record.id) || createImageFolderEntry(record));
                const sessionEntries = imageFolder.filter((entry) => !storedIds.has(entry.id));
                imageFolder = [...storedEntries, ...sessionEntries]
                    .sort((first, second) => second.createdAt - first.createdAt);
                renderImageFolder();
            } catch (error) {
                console.warn('Image Folder Load Error:', error);
                renderImageFolder();
            }
        }

            if (!appSwipeStartY) return;
            const touchEndY = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientY : 0;
            const deltaY = appSwipeStartY - touchEndY;

            if (deltaY > 50 && captureState !== STATES.CAPTURING && !imageFolderPanel.classList.contains('is-open') && !settingsPanel.classList.contains('is-open')) {

        function resetStackFrameHistory() {
            stackFrameHistory = [];
            stackMeanAccumulator = null;
            stackMeanFrameCount = 0;
        }

        function getRollingStackWindowMs() {
            return rollingStackWindowSeconds * 1000;
        }

        function getRollingStackSampleIntervalMs() {
            return Math.max(
                ROLLING_STACK_MIN_SAMPLE_INTERVAL_MS,
                Math.ceil(getRollingStackWindowMs() / ROLLING_STACK_TARGET_SAMPLES)
            );
        }

        function resizeRollingStackBuffers() {
            if (!bufferCanvas.width || !bufferCanvas.height) {
                return;
            }

            const sourceEdge = Math.max(bufferCanvas.width, bufferCanvas.height);
            const scale = Math.min(1, ROLLING_STACK_MAX_EDGE / sourceEdge);
            const nextWidth = Math.max(1, Math.round(bufferCanvas.width * scale));
            const nextHeight = Math.max(1, Math.round(bufferCanvas.height * scale));

            if (rollingSampleCanvas.width === nextWidth && rollingSampleCanvas.height === nextHeight) {
                return;
            }

            rollingSampleCanvas.width = nextWidth;
            rollingSampleCanvas.height = nextHeight;
            rollingCompositeCanvas.width = nextWidth;
            rollingCompositeCanvas.height = nextHeight;
            resetRollingStackFrames();
        }

        function resetRollingCompositeCanvas() {
            if (!rollingCompositeCanvas.width || !rollingCompositeCanvas.height) {
                return;
            }

            rollingCompositeCtx.globalCompositeOperation = 'source-over';
            rollingCompositeCtx.globalAlpha = 1;
            rollingCompositeCtx.fillStyle = 'black';
            rollingCompositeCtx.fillRect(0, 0, rollingCompositeCanvas.width, rollingCompositeCanvas.height);
        }

        function resetRollingStackFrames() {
            rollingStackFrames = [];
            rollingStackLastSampleAt = 0;
            rollingStackNeedsComposite = true;
            rollingStackMeanAccumulator = null;
            resetRollingCompositeCanvas();
        }

        function createRollingFrameCanvas(sourceCanvas) {
            const frameCanvas = document.createElement('canvas');
            frameCanvas.width = rollingSampleCanvas.width;
            frameCanvas.height = rollingSampleCanvas.height;

            const frameCtx = frameCanvas.getContext('2d', { alpha: false });
            frameCtx.globalCompositeOperation = 'source-over';
            frameCtx.globalAlpha = 1;
            frameCtx.drawImage(sourceCanvas, 0, 0, frameCanvas.width, frameCanvas.height);

            return frameCanvas;
        }

        function addRollingMeanFrame(framePixels) {
            const pixelCount = framePixels.length / 4;

            if (!rollingStackMeanAccumulator || rollingStackMeanAccumulator.length !== pixelCount * 3) {
                rollingStackFrames = [];
                rollingStackMeanAccumulator = new Float32Array(pixelCount * 3);
            }

            for (let index = 0, accumulatorIndex = 0; index < framePixels.length; index += 4, accumulatorIndex += 3) {
                rollingStackMeanAccumulator[accumulatorIndex] += framePixels[index];
                rollingStackMeanAccumulator[accumulatorIndex + 1] += framePixels[index + 1];
                rollingStackMeanAccumulator[accumulatorIndex + 2] += framePixels[index + 2];
            }
        }

        function removeRollingMeanFrame(framePixels) {
            if (!rollingStackMeanAccumulator) {
                return;
            }

            for (let index = 0, accumulatorIndex = 0; index < framePixels.length; index += 4, accumulatorIndex += 3) {
                rollingStackMeanAccumulator[accumulatorIndex] -= framePixels[index];
                rollingStackMeanAccumulator[accumulatorIndex + 1] -= framePixels[index + 1];
                rollingStackMeanAccumulator[accumulatorIndex + 2] -= framePixels[index + 2];
            }
        }

        function pruneRollingStackFrames(now) {
            const oldestFrameTime = now - getRollingStackWindowMs();
            let didPrune = false;

            while (rollingStackFrames.length && rollingStackFrames[0].createdAt < oldestFrameTime) {
                const expiredFrame = rollingStackFrames.shift();

                if (expiredFrame.pixels) {
                    removeRollingMeanFrame(expiredFrame.pixels);
                }

                didPrune = true;
            }

            if (didPrune) {
                rollingStackNeedsComposite = true;
            }

            return didPrune;
        }

        function captureRollingStackFrame(now) {
            if (!rollingSampleCanvas.width || !rollingSampleCanvas.height) {
                return false;
            }

            const sampleIntervalMs = getRollingStackSampleIntervalMs();

            if (rollingStackFrames.length && rollingStackLastSampleAt && now - rollingStackLastSampleAt < sampleIntervalMs) {
                return false;
            }

            rollingStackLastSampleAt = now;

            if (stackFrameProcessor === 'mean') {
                rollingSampleCtx.globalCompositeOperation = 'source-over';
                rollingSampleCtx.globalAlpha = 1;
                rollingSampleCtx.drawImage(bufferCanvas, 0, 0, rollingSampleCanvas.width, rollingSampleCanvas.height);

                const sampledFrame = rollingSampleCtx.getImageData(0, 0, rollingSampleCanvas.width, rollingSampleCanvas.height);
                const framePixels = copyFramePixels(sampledFrame.data);
                addRollingMeanFrame(framePixels);
                rollingStackFrames.push({
                    createdAt: now,
                    pixels: framePixels
                });
            } else {
                const stackFrameSource = buildStackFrameSource();
                rollingStackFrames.push({
                    createdAt: now,
                    canvas: createRollingFrameCanvas(stackFrameSource)
                });
            }

            rollingStackNeedsComposite = true;
            return true;
        }

        function composeRollingMeanStack() {
            resetRollingCompositeCanvas();

            if (!rollingStackFrames.length || !rollingStackMeanAccumulator) {
                return;
            }

            const output = rollingCompositeCtx.createImageData(rollingCompositeCanvas.width, rollingCompositeCanvas.height);
            const outputPixels = output.data;
            const frameCount = rollingStackFrames.length;

            for (let index = 0, accumulatorIndex = 0; index < outputPixels.length; index += 4, accumulatorIndex += 3) {
                outputPixels[index] = Math.round(rollingStackMeanAccumulator[accumulatorIndex] / frameCount);
                outputPixels[index + 1] = Math.round(rollingStackMeanAccumulator[accumulatorIndex + 1] / frameCount);
                outputPixels[index + 2] = Math.round(rollingStackMeanAccumulator[accumulatorIndex + 2] / frameCount);
                outputPixels[index + 3] = 255;
            }

            rollingCompositeCtx.putImageData(output, 0, 0);
        }

        function composeRollingCanvasStack() {
            resetRollingCompositeCanvas();

            if (!rollingStackFrames.length) {
                return;
            }

            rollingCompositeCtx.globalCompositeOperation = stackBlendMode;
            rollingCompositeCtx.globalAlpha = stackFrameOpacity;

            for (const frame of rollingStackFrames) {
                rollingCompositeCtx.drawImage(frame.canvas, 0, 0, rollingCompositeCanvas.width, rollingCompositeCanvas.height);
            }

            rollingCompositeCtx.globalCompositeOperation = 'source-over';
            rollingCompositeCtx.globalAlpha = 1;
        }

        function drawRollingStackFrame(now) {
            resizeRollingStackBuffers();

            const didPrune = pruneRollingStackFrames(now);
            const didCapture = captureRollingStackFrame(now);

            if (didPrune || didCapture || rollingStackNeedsComposite) {
                if (stackFrameProcessor === 'mean') {
                    composeRollingMeanStack();
                } else {
                    composeRollingCanvasStack();
                }

                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;
                ctx.drawImage(rollingCompositeCanvas, 0, 0, canvas.width, canvas.height);
                rollingStackNeedsComposite = false;
            }
        }

        function copyFramePixels(sourcePixels) {
            return new Uint8ClampedArray(sourcePixels);
        }

        function buildPreviousCurrentMeanFrame(currentPixels) {
            const previousPixels = stackFrameHistory.length ? stackFrameHistory[stackFrameHistory.length - 1] : null;

            if (!previousPixels) {
                return null;
            }

            const output = blendCtx.createImageData(bufferCanvas.width, bufferCanvas.height);
            const outputPixels = output.data;

            for (let index = 0; index < currentPixels.length; index += 4) {
                outputPixels[index] = Math.round((previousPixels[index] + currentPixels[index]) * 0.5);
                outputPixels[index + 1] = Math.round((previousPixels[index + 1] + currentPixels[index + 1]) * 0.5);
                outputPixels[index + 2] = Math.round((previousPixels[index + 2] + currentPixels[index + 2]) * 0.5);
                outputPixels[index + 3] = 255;
            }

            return output;
        }

        function buildMeanFrame(currentPixels) {
            const pixelCount = currentPixels.length / 4;

            if (!stackMeanAccumulator || stackMeanAccumulator.length !== pixelCount * 3) {
                stackMeanAccumulator = new Float32Array(pixelCount * 3);
                stackMeanFrameCount = 0;
            }

            stackMeanFrameCount += 1;

            const output = blendCtx.createImageData(bufferCanvas.width, bufferCanvas.height);
            const outputPixels = output.data;
            const previousWeight = (stackMeanFrameCount - 1) / stackMeanFrameCount;
            const currentWeight = 1 / stackMeanFrameCount;

            for (let index = 0, accumulatorIndex = 0; index < currentPixels.length; index += 4, accumulatorIndex += 3) {
                const redMean = (stackMeanAccumulator[accumulatorIndex] * previousWeight) + (currentPixels[index] * currentWeight);
                const greenMean = (stackMeanAccumulator[accumulatorIndex + 1] * previousWeight) + (currentPixels[index + 1] * currentWeight);
                const blueMean = (stackMeanAccumulator[accumulatorIndex + 2] * previousWeight) + (currentPixels[index + 2] * currentWeight);

                stackMeanAccumulator[accumulatorIndex] = redMean;
                stackMeanAccumulator[accumulatorIndex + 1] = greenMean;
                stackMeanAccumulator[accumulatorIndex + 2] = blueMean;

                outputPixels[index] = Math.round(redMean);
                outputPixels[index + 1] = Math.round(greenMean);
                outputPixels[index + 2] = Math.round(blueMean);
                outputPixels[index + 3] = 255;
            }

            return output;
        }

        function buildMedianFrame(currentPixels) {
            const medianFrames = stackFrameHistory.slice(-(stackMedianFrameCount - 1));

            if (medianFrames.length < (stackMedianFrameCount - 1)) {
                return buildPreviousCurrentMeanFrame(currentPixels);
            }

            const sourceFrames = [...medianFrames, currentPixels];
            const output = blendCtx.createImageData(bufferCanvas.width, bufferCanvas.height);
            const outputPixels = output.data;

            for (let index = 0; index < currentPixels.length; index += 4) {
                const redSamples = sourceFrames.map((frame) => frame[index]).sort((a, b) => a - b);
                const greenSamples = sourceFrames.map((frame) => frame[index + 1]).sort((a, b) => a - b);
                const blueSamples = sourceFrames.map((frame) => frame[index + 2]).sort((a, b) => a - b);
                const middleIndex = Math.floor(sourceFrames.length / 2);

                outputPixels[index] = redSamples[middleIndex];
                outputPixels[index + 1] = greenSamples[middleIndex];
                outputPixels[index + 2] = blueSamples[middleIndex];
                outputPixels[index + 3] = 255;
            }

            return output;
        }

        function buildStackFrameSource() {
            if (stackFrameProcessor === 'raw') {
                return bufferCanvas;
            }

            const currentFrame = bufferCtx.getImageData(0, 0, bufferCanvas.width, bufferCanvas.height);
            const currentPixels = currentFrame.data;
            const processedFrame = stackFrameProcessor === 'median'
                ? buildMedianFrame(currentPixels)
                : buildMeanFrame(currentPixels);

            if (processedFrame) {
                blendCtx.putImageData(processedFrame, 0, 0);
            } else {
                blendCtx.putImageData(currentFrame, 0, 0);
            }

            if (stackFrameProcessor === 'median') {
                stackFrameHistory.push(copyFramePixels(currentPixels));

                while (stackFrameHistory.length > stackMedianFrameCount) {
                    stackFrameHistory.shift();
                }
            }

            return blendCanvas;
        }

        function clearReviewImage() {

            if (!requestFullscreen) {

            }

            try {
                return Promise.resolve(requestFullscreen.call(viewport, { navigationUI: 'hide' })).catch(() => {});
            } catch (error) {
                try {
                    return Promise.resolve(requestFullscreen.call(viewport)).catch(() => {});

            const exitFullscreen = document.exitFullscreen

                || document.msExitFullscreen;

            if (!fullscreenElement || !exitFullscreen) {

        function syncUi() {

            const isRecording = captureState === STATES.CAPTURING;
            const hasCapture = captureState === STATES.REVIEW;

            setButtonDisabled(triggerBtn, !isReady || isStarting);
            setButtonDisabled(imageFolderBtn, isStarting || isRecording);
            setButtonDisabled(saveBtn, !hasCapture || isStarting);

            triggerBtn.classList.toggle('text-white', isRecording);
            triggerBtn.classList.toggle('bg-white', !isRecording);
            triggerBtn.classList.toggle('text-black', !isRecording);
            triggerBtn.setAttribute('aria-label', isRecording ? 'Stop capture' : 'Start capture');
            triggerBtn.setAttribute('aria-pressed', String(isRecording));
            triggerBtn.classList.toggle('is-recording', isRecording);

            pingRing.classList.toggle('hidden', !isRecording);

        function openSettings() {
            setFullscreenControlVisible(false);
            settingsPanel.classList.remove('hidden');
        }

        function closeSettings() {

        function clearCompositeCanvas() {
            if (!canvas.width || !canvas.height) {
                return;
            }

            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1;
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            resetStackFrameHistory();
            resetRollingStackFrames();
        }

        function handleVideoResize() {
            if (!video.videoWidth || !video.videoHeight) {
                return;
            }

            if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                const wasCapturing = captureState === STATES.CAPTURING;

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                bufferCanvas.width = video.videoWidth;
                bufferCanvas.height = video.videoHeight;
                blendCanvas.width = video.videoWidth;
                blendCanvas.height = video.videoHeight;
                resizeRollingStackBuffers();
                
                updateAppLayout();

                if (captureState === STATES.IDLE || captureState === STATES.PREVIEW || captureState === STATES.CAPTURING) {
                    clearCompositeCanvas();
                    if (wasCapturing) {
                        // Let it gracefully continue starting fresh from this orientation
                        showToast('Orientation changed', STATES.CAPTURING);
                    }
                }
            }
        }

        function startRenderLoop() {
            if (animationFrameId) {
                return;
            }

            const tick = () => {
                drawFrame();
                animationFrameId = requestAnimationFrame(tick);
            };

            tick();
        }

        function stopRenderLoop() {
            if (!animationFrameId) {
                return;
            }

            cancelAnimationFrame(animationFrameId);
            animationFrameId = 0;
        }

        function setState(nextState) {
            captureState = nextState;

            if (captureState === STATES.REVIEW) {
                stopRenderLoop();
            } else if (mediaStream) {
                currentCapture = null;
                clearReviewImage();
                startRenderLoop();
            } else {
                currentCapture = null;
            }

            syncUi();
        }

        async function shareCapture(blob, fileName) {
            if (!supportsCaptureSharing) {
                return false;
            }

            const file = new File([blob], fileName, { type: blob.type });

            if (!navigator.canShare({ files: [file] })) {
                return false;
            }

            await navigator.share({
                files: [file],
                title: 'Volumetric Time Capture'
            });

            return true;
        }

        function shouldUseNativeImageSave() {
            return isAppleMobileDevice();
        }

        function isMobileDevice() {
            const userAgent = navigator.userAgent || '';
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent) || isAppleMobileDevice();
        }

        async function saveCaptureBlob(blob, fileName) {
            if (shouldUseNativeImageSave()) {
                const didShare = await shareCapture(blob, fileName);
                if (didShare) {
                    return;
                }
            }

            downloadBlob(blob, fileName);
        }

        function showError(message) {
            startOverlay.classList.add('hidden');
            errorView.classList.remove('hidden');
            errorMsg.innerText = message;
        }

        function describeCameraError(error) {
            switch (error.name) {
                case 'NotAllowedError':
                    return 'Camera permission was denied. Please allow access and try again.';
                case 'NotFoundError':
                    return 'No camera was found on this device.';
                case 'NotReadableError':
                    return 'The camera is already in use by another app.';
                case 'OverconstrainedError':
                    return 'This device could not match the requested camera settings.';
                case 'SecurityError':
                    return 'Camera access requires HTTPS or localhost.';
                default:
                    return error.message || 'Could not access the camera.';
            }
        }

        function waitForVideoReady(timeoutMs = 10000) {
            if (video.videoWidth && video.videoHeight) {
                return Promise.resolve();
            }

            return new Promise((resolve, reject) => {
                const timeoutId = window.setTimeout(() => {
                    cleanup();
                    reject(new Error('Camera preview timed out.'));
                }, timeoutMs);

                function cleanup() {
                    window.clearTimeout(timeoutId);
                    video.removeEventListener('loadedmetadata', handleReady);
                    video.removeEventListener('playing', handleReady);
                    video.removeEventListener('error', handleError);
                }

                function handleReady() {
                    if (!video.videoWidth || !video.videoHeight) {
                        return;
                    }

                    cleanup();
                    resolve();
                }

                function handleError() {
                    cleanup();
                    reject(new Error('Camera preview could not start.'));
                }

                video.addEventListener('loadedmetadata', handleReady);
                video.addEventListener('playing', handleReady);
                video.addEventListener('error', handleError);
            });
        }

        async function updateCameraDeviceList() {
            if (!navigator.mediaDevices || typeof navigator.mediaDevices.enumerateDevices !== 'function') {
                return;
            }

            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                availableVideoDevices = devices.filter(device => device.kind === 'videoinput');
                
                if (availableVideoDevices.length <= 1) {
                    cameraLensField.classList.add('hidden');
                    return;
                }

                cameraLensSelect.innerHTML = '';
                availableVideoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.textContent = device.label || `Camera ${index + 1}`;
                    if (selectedVideoDeviceId === device.deviceId) {
                        option.selected = true;
                    }
                    cameraLensSelect.appendChild(option);
                });

                cameraLensField.classList.remove('hidden');
            } catch (error) {
                console.warn('Could not enumerate devices:', error);
            }
        }

        async function requestCameraStream() {
            let lastError = null;

            if (selectedVideoDeviceId) {
                try {
                    return await navigator.mediaDevices.getUserMedia({
                        video: { deviceId: { exact: selectedVideoDeviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                        audio: false
                    });
                } catch (error) {
                    console.warn('Failed to start chosen camera. Falling back to default.');
                    selectedVideoDeviceId = null;
                }
            }

            for (const constraints of cameraProfiles) {
                try {
                    return await navigator.mediaDevices.getUserMedia(constraints);
                } catch (error) {
                    lastError = error;
                    if (error.name !== 'OverconstrainedError' && error.name !== 'NotFoundError') {
                        throw error;
                    }
                }
            }

            throw lastError || new Error('Could not access the camera.');
        }

        function drawFrame() {
            if (!mediaStream || video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
                return;
            }

            bufferCtx.globalCompositeOperation = 'source-over';
            bufferCtx.drawImage(video, 0, 0, bufferCanvas.width, bufferCanvas.height);

            if (captureState === STATES.PREVIEW) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;
                ctx.drawImage(bufferCanvas, 0, 0, canvas.width, canvas.height);
            } else if (captureState === STATES.CAPTURING) {
                if (rollingStackEnabled) {
                    drawRollingStackFrame(performance.now());
                } else {
                    const stackFrameSource = buildStackFrameSource();
                    const frameOpacity = stackFrameProcessor === 'mean' ? 1 : stackFrameOpacity;
                    ctx.globalCompositeOperation = stackBlendMode;
                    ctx.globalAlpha = frameOpacity;
                    ctx.drawImage(stackFrameSource, 0, 0, canvas.width, canvas.height);
                    ctx.globalAlpha = 1;
                }
            }
        }

        function stopStream() {
            if (!mediaStream) {
                return;
            }

            mediaStream.getTracks().forEach((track) => track.stop());
            mediaStream = null;
            video.srcObject = null;
        }

        async function startSystem() {
            if (isStarting || mediaStream) {
                return;
            }

            if (!window.isSecureContext) {
                showError('Camera access requires HTTPS or localhost. If you are opening this from the Raspberry Pi over a local IP address, the page needs to be served securely.');
                return;
            }

            if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
                showError('This browser does not support live camera capture. Try a recent version of Safari or Chrome.');
                return;
            }

            isStarting = true;
            syncUi();

            try {
                mediaStream = await requestCameraStream();
                
                // Enumerate devices once we successfully gain initial permissions
                if (!availableVideoDevices.length) {
                    await updateCameraDeviceList();
                    // Set selected UI to what we're currently using
                    if (mediaStream.getVideoTracks().length > 0) {
                        const currentDeviceId = mediaStream.getVideoTracks()[0].getSettings().deviceId;
                        let defaultId = currentDeviceId;
                        
                        // Try to auto-select the standard rear lens (usually "camera 0") instead of telephoto
                        const standardLens = availableVideoDevices.find(d => {
                            const lbl = d.label.toLowerCase();
                            // Android often labels the primary wide lens as 'camera 0, facing back'
                            return (lbl.includes('camera 0') || lbl.match(/\b0\b/)) && 
                                   (lbl.includes('back') || lbl.includes('environment'));
                        });

                        if (!selectedVideoDeviceId && standardLens && standardLens.deviceId !== currentDeviceId) {
                            defaultId = standardLens.deviceId;
                            selectedVideoDeviceId = defaultId;
                            
                            // Re-request stream immediately to swap to the standard lens
                            stopStream();
                            mediaStream = await requestCameraStream();
                        } else {
                            selectedVideoDeviceId = currentDeviceId;
                        }

                        if (cameraLensSelect.querySelector(`option[value="${selectedVideoDeviceId}"]`)) {
                            cameraLensSelect.value = selectedVideoDeviceId;
                        }
                    }
                }

                const readyPromise = waitForVideoReady();
                video.srcObject = mediaStream;
                await Promise.all([readyPromise, video.play()]);

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                bufferCanvas.width = video.videoWidth;
                bufferCanvas.height = video.videoHeight;
                blendCanvas.width = video.videoWidth;
                blendCanvas.height = video.videoHeight;
                resizeRollingStackBuffers();
                
                updateAppLayout();

                clearCompositeCanvas();
                errorView.classList.add('hidden');
                startOverlay.classList.add('hidden');
                setState(STATES.PREVIEW);
                drawFrame();
            } catch (error) {
                console.error('Camera Error:', error);
                stopStream();
                setState(STATES.IDLE);
                showError(describeCameraError(error));
            } finally {
                isStarting = false;
                syncUi();
            }
        }

        function startCapture() {
            if (!mediaStream || !canvas.width || !canvas.height) {
                return;
            }

            clearCompositeCanvas();
            setState(STATES.CAPTURING);
        }

        async function stopCapture() {
            if (captureState !== STATES.CAPTURING) {
                return;
            }

            setState(STATES.REVIEW);

            try {
                const blob = await canvasToBlob(canvas, 'image/jpeg', 0.92);
                const captureRecord = createCaptureRecord(blob);
                currentCapture = addCaptureToImageFolder(captureRecord);
                showReviewImage(blob);
                showToast('Added to Folder');
            } catch (error) {
                console.error('Review Image Error:', error);
            }
        }

        function closeReviewCapture() {
            if (captureState !== STATES.REVIEW) {
                return;
            }

            clearReviewImage();
            currentCapture = null;

            if (mediaStream) {
                setState(STATES.PREVIEW);
                drawFrame();
            } else {
                startOverlay.classList.remove('hidden');
                setState(STATES.IDLE);
            }
        }

        function canvasToBlob(targetCanvas, type, quality) {
            return new Promise((resolve, reject) => {
                targetCanvas.toBlob((blob) => {
                    if (!blob) {
                        reject(new Error('Could not create an image from the current capture.'));
                        return;
                    }

                    resolve(blob);
                }, type, quality);
            });
        }

        function downloadBlob(blob, fileName) {
            const objectUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = fileName;
            link.href = objectUrl;
            link.target = '_blank';
            link.rel = 'noopener';
            document.body.appendChild(link);
            link.click();
            link.remove();
            window.setTimeout(() => URL.revokeObjectURL(objectUrl), 60000);
        }

        function reviewImageFolderCapture(capture) {
            if (!capture || captureState === STATES.CAPTURING) {
                return;
            }

            closeImageFolder();
            startOverlay.classList.add('hidden');
            errorView.classList.add('hidden');
            currentCapture = capture;
            setState(STATES.REVIEW);
            currentCapture = capture;
            showReviewImage(capture.blob);
            syncUi();
        }

        async function saveImageFolderCapture(capture) {
            if (!capture) {
                return;
            }

            try {
                await saveCaptureBlob(capture.blob, capture.fileName);
                capture.downloaded = true;
                
                try {
                    await persistImageFolderRecord(capture);
                } catch (dbError) {
                    console.warn('Could not save download state to DB (likely incognito mode):', dbError);
                }
                
                renderImageFolder();
                showToast('Saved JPG');
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error('Save Error:', error);
                    showToast('Could not save JPG');
                }
            }
        }

        async function deleteImageFolderCapture(id) {
            const index = imageFolder.findIndex((capture) => capture.id === id);
            if (index === -1) {
                return;
            }

            const [removedCapture] = imageFolder.splice(index, 1);
            revokeImageFolderEntry(removedCapture);
            renderImageFolder();

            if (currentCapture && currentCapture.id === id && captureState === STATES.REVIEW) {
                clearReviewImage();
                currentCapture = null;

                if (mediaStream) {
                    setState(STATES.PREVIEW);
                    drawFrame();
                } else {
                    startOverlay.classList.remove('hidden');
                    setState(STATES.IDLE);
                }
            }

            try {
                await deleteStoredImageFolderRecord(id);
                showToast('Removed from Folder');
            } catch (error) {
                console.warn('Image Folder Delete Error:', error);
                showToast('Could not update Folder');
            }
        }

        async function handleDeleteAllClick() {
            if (!imageFolder.length) {
                return;
            }

            if (!confirm('Are you sure you want to delete all photos?')) {
                return;
            }

            const db = await openImageFolderDb();
            
            try {
                // Clear from IDB
                await new Promise((resolve, reject) => {
                    const transaction = db.transaction(IMAGE_FOLDER_STORE_NAME, 'readwrite');
                    const store = transaction.objectStore(IMAGE_FOLDER_STORE_NAME);
                    const request = store.clear();

                    request.onerror = () => reject(request.error);
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => reject(transaction.error);
                });

                // Clear from memory
                imageFolder.forEach(revokeImageFolderEntry);
                imageFolder = [];
                renderImageFolder();

                // Clear current capture state if needed
                if (currentCapture && captureState === STATES.REVIEW) {
                    clearReviewImage();
                    currentCapture = null;

                    if (mediaStream) {
                        setState(STATES.PREVIEW);
                        drawFrame();
                    } else {
                        startOverlay.classList.remove('hidden');
                        setState(STATES.IDLE);
                    }
                }

                showToast('All photos deleted');
            } catch (error) {
                console.warn('Image Folder Delete All Error:', error);
                showToast('Could not empty Folder');
            }
        }

        async function handleDownloadAllClick() {
            if (!imageFolder.length) {
                return;
            }

            setButtonDisabled(downloadAllBtn, true);

            try {
                // Standard browser behavior with a-tags downloading in succession
                for (let i = 0; i < imageFolder.length; i++) {
                    const capture = imageFolder[i];
                    if (capture.downloaded) continue; // optionally skip already downloaded ones?
                    
                    await saveCaptureBlob(capture.blob, capture.fileName);
                    capture.downloaded = true;
                    
                    try {
                        await persistImageFolderRecord(capture);
                    } catch (dbError) {
                        console.warn('Could not save download state to DB (likely incognito mode):', dbError);
                    }
                    
                    // Add slight delay to prevent browsers blocking multiple downloads at once
                    if (i < imageFolder.length - 1) {
                        await new Promise((resolve) => setTimeout(resolve, 800));
                    }
                }
                renderImageFolder();
                showToast('Saved all JPGs');
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error('Download All Error:', error);
                    showToast('Could not download all');
                }
            } finally {
                setButtonDisabled(downloadAllBtn, false);
            }
        }

        function handleImageFolderClick(event) {
            if (!(event.target instanceof Element)) {
                return;
            }

            const actionTarget = event.target.closest('[data-folder-action]');
            if (!actionTarget) {
                return;
            }

            const card = actionTarget.closest('[data-capture-id]');
            if (!card) {
                return;
            }

            const capture = findImageFolderCapture(card.dataset.captureId);
            if (!capture) {
                return;
            }

            if (actionTarget.dataset.folderAction === 'review') {
                reviewImageFolderCapture(capture);
            } else if (actionTarget.dataset.folderAction === 'save') {
                saveImageFolderCapture(capture);
            } else if (actionTarget.dataset.folderAction === 'delete') {
                deleteImageFolderCapture(capture.id);
            }
        }

        async function saveCapture() {
            if (captureState !== STATES.REVIEW || saveBtn.disabled) {
                return;
            }

            setButtonDisabled(saveBtn, true);

            try {
                const blob = currentCapture ? currentCapture.blob : await canvasToBlob(canvas, 'image/jpeg', 0.92);
                const fileName = currentCapture ? currentCapture.fileName : `time-volume-${Date.now()}.jpg`;
                await saveCaptureBlob(blob, fileName);
                
                if (currentCapture) {
                    currentCapture.downloaded = true;
                    
                    try {
                        await persistImageFolderRecord(currentCapture);
                    } catch (dbError) {
                        console.warn('Could not save download state to DB (likely incognito mode):', dbError);
                    }
                    
                    renderImageFolder();
                }

                showToast('Saved JPG');
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error('Save Error:', error);
                    showToast('Could not save JPG');
                }
            } finally {
                syncUi();
            }
        }

        function handleTriggerClick() {
            if (captureState === STATES.CAPTURING) {
                stopCapture();
                return;
            }

            startCapture();
        }

        function handleVisibilityChange() {
            if (document.hidden) {
                stopRenderLoop();
                return;
            }

            if (mediaStream && captureState !== STATES.REVIEW) {
                video.play().catch(() => {});
                startRenderLoop();
                if (captureState === STATES.PREVIEW) {
                    drawFrame();
                }
            }
        }

        function teardownCamera() {
            closeSettings();
            closeImageFolder();
            clearReviewImage();
            stopRenderLoop();
            exitCameraFullscreen({ skipNativeExit: true });
            stopStream();
        }

        function handleStackBlendModeChange() {
            const nextMode = STACK_BLEND_MODES[stackBlendModeSelect.value];
            if (!nextMode) {
                return;
            }

            stackBlendModeKey = stackBlendModeSelect.value;
            stackBlendMode = nextMode.composite;
            stackFrameOpacity = nextMode.opacity;
            stackFrameProcessor = nextMode.processor;
            resetStackFrameHistory();
            resetRollingStackFrames();

            if (captureState === STATES.CAPTURING) {
                clearCompositeCanvas();
            }

            syncStackSettingsUi();
        }

        function handleStackOpacityInput() {
            stackFrameOpacity = Number(stackOpacitySlider.value) / 100;
            stackOpacityValue.textContent = `${Math.round(stackFrameOpacity * 100)}%`;
            rollingStackNeedsComposite = true;
        }

        function handleMedianFrameCountInput() {
            stackMedianFrameCount = Number(medianFrameCountSlider.value);
            medianFrameCountValue.textContent = String(stackMedianFrameCount);
            resetStackFrameHistory();
            resetRollingStackFrames();
        }

        function handleRollingStackEnabledChange() {
            rollingStackEnabled = rollingStackEnabledInput.checked;
            clearCompositeCanvas();
            syncStackSettingsUi();

            if (captureState === STATES.CAPTURING) {
                drawFrame();
            }
        }

        function handleRollingStackWindowInput() {
            rollingStackWindowSeconds = Number(rollingStackWindowSlider.value);
            rollingStackWindowValue.textContent = `${rollingStackWindowSeconds}s`;
            pruneRollingStackFrames(performance.now());
            rollingStackNeedsComposite = true;

            if (captureState === STATES.CAPTURING && rollingStackEnabled) {
                drawFrame();
            }
        }

        async function handleCameraLensChange() {
            if (cameraLensSelect.value === selectedVideoDeviceId) {
                return;
            }

            selectedVideoDeviceId = cameraLensSelect.value;
            
            if (mediaStream) {
                const wasCapturing = captureState === STATES.CAPTURING;
                stopStream();
                setState(STATES.IDLE);
                
                await startSystem();
                if (wasCapturing) {
                    startCapture();
                }
            }
        }

        initBtn.addEventListener('click', startSystem);
        triggerBtn.addEventListener('click', handleTriggerClick);
        imageFolderBtn.addEventListener('click', openImageFolder);
        imageFolderBackdrop.addEventListener('click', closeImageFolder);
        closeImageFolderBtn.addEventListener('click', closeImageFolder);
        deleteAllBtn.addEventListener('click', handleDeleteAllClick);
        downloadAllBtn.addEventListener('click', handleDownloadAllClick);
        imageFolderGrid.addEventListener('click', handleImageFolderClick);
        viewport.addEventListener('click', handleViewportTap);
        settingsBtn.addEventListener('click', openSettings);
        settingsBackdrop.addEventListener('click', closeSettings);
        settingsScroll.addEventListener('click', (e) => {
            if (e.target === settingsScroll) closeSettings();
        });
        closeSettingsBtn.addEventListener('click', closeSettings);
        stackBlendModeSelect.addEventListener('change', handleStackBlendModeChange);
        stackOpacitySlider.addEventListener('input', handleStackOpacityInput);
        medianFrameCountSlider.addEventListener('input', handleMedianFrameCountInput);
        rollingStackEnabledInput.addEventListener('change', handleRollingStackEnabledChange);
        rollingStackWindowSlider.addEventListener('input', handleRollingStackWindowInput);
        cameraLensSelect.addEventListener('change', handleCameraLensChange);
        closePreviewBtn.addEventListener('click', closeReviewCapture);
        fullscreenToggleBtn.addEventListener('click', handleFullscreenToggleClick);
        saveBtn.addEventListener('click', saveCapture);
        video.addEventListener('resize', handleVideoResize);
        document.addEventListener('visibilitychange', handleVisibilityChange);
        document.addEventListener('fullscreenchange', handleNativeFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleNativeFullscreenChange);
        window.addEventListener('resize', updateAppLayout);
        window.addEventListener('pagehide', teardownCamera);
        window.addEventListener('beforeunload', teardownCamera);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch((error) => {
                    console.error('Service Worker Registration Failed:', error);
                });
            });
        }

        syncStackSettingsUi();
        renderImageFolder();
        loadImageFolder();
        syncUi();
    </script>
</body>
</html>
